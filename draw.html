<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行動參與</title>
    <style>
        /* ==================== 全域設定 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #FFFFFF;
            --color-text: #1A1A1A;
            --color-accent: #E01E1E;
            --color-line: #D0D0D0;
            --spacing-unit: 1.5rem;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", 
                         "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            font-size: 1rem;
            overflow-x: hidden;
        }

        /* ==================== 三欄佈局 ==================== */
        .page-wrapper {
            display: grid;
            grid-template-columns: 1fr minmax(auto, 500px) 1fr;
            min-height: 100vh;
        }

        .side-panel {
            background: #F5F5F5;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
        }

        .main-content {
            background: var(--color-bg);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ==================== Header ==================== */
        .header {
            background: var(--color-accent);
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }

        .header-logo {
            height: 50px;
            cursor: pointer;
        }

        .header-logo img {
            height: 100%;
            width: auto;
        }

        .hamburger-menu {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 0;
        }

        .hamburger-line {
            width: 30px;
            height: 3px;
            background: white;
            transition: all 0.3s ease;
        }

        /* Side Menu */
        .side-menu {
    position: fixed;
    top: -100%;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
        }

        .side-menu.active {
            top: 0;
        }

        .menu-header {
            background: var(--color-accent);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .menu-close {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            transition: transform 0.3s ease;
        }

        .menu-close:hover {
            transform: rotate(90deg);
        }

        .menu-content {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
        }

        .menu-item {
            text-decoration: none;
            color: white;
            font-size: 1.125rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            position: relative;
        }

        .menu-item-icon {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
            color: var(--color-accent);
        }

        .menu-item:hover .menu-item-icon {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .menu-item-text-zh {
            font-size: 1.125rem;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        .menu-item-text-en {
            font-size: 0.75rem;
            opacity: 0.9;
            letter-spacing: 0.05em;
        }

        .menu-item::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 2rem;
            background: rgba(255, 255, 255, 0.3);
        }

        .menu-item:last-child::after {
            display: none;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ==================== 中欄內容區 ==================== */
        .content-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-unit);
        }

        /* ==================== Logo 區域 (legacy, hidden) ==================== */
        .logo-container {
            display: none;
        }

        .logo-placeholder {
            display: none;
        }

        /* ==================== 主容器 ==================== */
        .container {
            width: 100%;
            max-width: 500px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* ==================== 階段容器 ==================== */
        .stage {
            display: none;
            animation: slideIn 0.6s ease;
        }

        .stage.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 標題區 ==================== */
        h1 {
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .subtitle {
            font-size: 0.875rem;
            font-weight: 400;
            line-height: 1.6;
            opacity: 0.7;
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        /* ==================== 表單元素 ==================== */
        .form-group {
            margin-bottom: calc(var(--spacing-unit) * 1.5);
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 0;
            font-size: 1.125rem;
            border: none;
            border-bottom: 1px solid var(--color-line);
            background: transparent;
            outline: none;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-bottom-color: var(--color-accent);
        }

        input[type="text"]::placeholder {
            color: #B0B0B0;
        }

        /* ==================== 錯誤訊息 ==================== */
        .error-message {
            color: var(--color-accent);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* ==================== 按鈕 ==================== */
        button {
            width: 100%;
            padding: 1.125rem;
            margin-top: calc(var(--spacing-unit) * 1.5);
            background: var(--color-text);
            color: var(--color-bg);
            border: none;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            background: var(--color-accent);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--color-accent);
        }

        button.primary:hover {
            background: #C01818;
        }

        /* ==================== 結果顯示 ==================== */
        .result {
            text-align: center;
            padding: calc(var(--spacing-unit) * 1.5) 0;
        }

        .result-number {
            font-size: 4rem;
            font-weight: 300;
            color: var(--color-accent);
            line-height: 1;
            margin: calc(var(--spacing-unit) * 1.5) 0;
            letter-spacing: -0.03em;
        }

        .result-text {
            font-size: 1.125rem;
            line-height: 1.8;
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        /* ==================== 導航按鈕 ==================== */
        .navigation {
            display: flex;
            gap: 0.75rem;
            margin-top: calc(var(--spacing-unit) * 1.5);
        }

        .nav-button {
            flex: 1;
            padding: 1rem;
            background: white;
            color: var(--color-text);
            border: 1px solid var(--color-line);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0;
        }

        .nav-button:hover {
            border-color: var(--color-text);
            background: #F5F5F5;
        }

        .nav-button.primary {
            background: var(--color-accent);
            color: white;
            border-color: var(--color-accent);
        }

        .nav-button.primary:hover {
            background: #C01818;
            border-color: #C01818;
        }

        /* ==================== draw/gallery 內建 header ==================== */
        .inner-header {
            background: var(--color-accent);
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
            flex-shrink: 0;
        }

        .inner-header-logo {
            height: 50px;
            cursor: pointer;
        }

        .inner-header-logo img {
            height: 100%;
            width: auto;
        }

        .inner-hamburger {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 0;
        }

        .inner-hamburger .hamburger-line {
            width: 30px;
            height: 3px;
            background: white;
            transition: all 0.3s ease;
        }

        /* ==================== 繪圖頁面 ==================== */
        .draw-stage {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: var(--color-bg);
            transition: top 1s ease;
            z-index: 50;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .draw-stage.slide-up {
            top: 0;
        }

        .draw-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .draw-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            padding-top: calc(1rem + env(safe-area-inset-top));
            padding-bottom: calc(2rem + env(safe-area-inset-bottom));
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease 0.5s;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .draw-stage.slide-up .draw-container {
            opacity: 1;
            transform: translateY(0);
        }

        .draw-title {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        .draw-instruction {
            text-align: center;
            font-size: 0.875rem;
            opacity: 0.6;
            margin-bottom: 1rem;
        }

        /* ==================== 畫布 ==================== */
        .canvas-wrapper {
            position: relative;
            background: #FAFAFA;
            border: 1px solid var(--color-line);
            margin-bottom: 1rem;
            touch-action: none;
        }

        #drawCanvas {
            display: block;
            width: 100%;
            touch-action: none;
            cursor: crosshair;
        }

        /* ==================== 工具列 ==================== */
        .tools {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .tool-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .tool-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
            width: 100%;
            margin-bottom: 0.25rem;
        }

        .tool-button {
            width: 44px;
            height: 44px;
            border: 2px solid var(--color-line);
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            padding: 0;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        .tool-button img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .tool-button:hover {
            border-color: var(--color-text);
            transform: scale(1.05);
        }

        .tool-button.active {
            border-color: var(--color-accent);
            background: var(--color-accent);
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(224, 30, 30, 0.3);
        }

        .tool-button.active img {
            filter: brightness(0) invert(1);
        }

        /* 顏色按鈕網格佈局 */
        .color-group {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.5rem;
            width: 100%;
        }

        .color-button {
            width: 44px;
            height: 44px;
            border: 2px solid var(--color-line);
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 50%;
            position: relative;
        }

        .color-button:hover {
            transform: scale(1.05);
        }

        .color-button.active {
            border-color: var(--color-text);
            border-width: 3px;
            transform: scale(1.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .color-button.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }

        .size-button {
            width: 44px;
            height: 44px;
            border: 2px solid var(--color-line);
            background: white;
            color: var(--color-text);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0;
            margin: 0;
        }

        .size-button:hover {
            border-color: var(--color-text);
            transform: scale(1.05);
        }

        .size-button.active {
            border-color: var(--color-accent);
            background: var(--color-accent);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(224, 30, 30, 0.3);
        }

        /* ==================== 操作按鈕 ==================== */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }

        .action-button {
            padding: 0.875rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .clear-button {
            background: white;
            color: var(--color-text);
            border: 1px solid var(--color-line);
        }

        .clear-button:hover {
            background: #F5F5F5;
            border-color: var(--color-text);
        }

        .undo-button {
            background: white;
            color: var(--color-text);
            border: 1px solid var(--color-line);
        }

        .undo-button:hover {
            background: #F5F5F5;
            border-color: var(--color-text);
        }

        .undo-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .submit-button {
            background: var(--color-text);
            color: white;
        }

        .submit-button:hover {
            background: var(--color-accent);
        }

        /* ==================== 畫廊頁面 ==================== */
        .gallery-stage {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: var(--color-bg);
            transition: top 1s ease;
            z-index: 60;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .gallery-stage.slide-up {
            top: 0;
        }

        .gallery-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            padding-top: calc(1rem + env(safe-area-inset-top));
            padding-bottom: calc(2rem + env(safe-area-inset-bottom));
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease 0.5s;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .gallery-stage.slide-up .gallery-container {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-title {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        .gallery-subtitle {
            text-align: center;
            font-size: 0.875rem;
            opacity: 0.6;
            margin-bottom: 1.5rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            border: 1px solid var(--color-line);
            background: #FAFAFA;
            overflow: hidden;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            border-color: var(--color-accent);
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .your-drawing {
            border: 2px solid var(--color-accent);
            position: relative;
        }

        .your-drawing::after {
            content: '你的作品';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--color-accent);
            color: white;
            font-size: 0.625rem;
            padding: 0.25rem 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .gallery-actions {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
            padding-bottom: 1rem;
        }

        .home-button {
            padding: 1rem 2rem;
            background: white;
            color: var(--color-text);
            border: 1px solid var(--color-line);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .home-button:hover {
            background: var(--color-text);
            color: white;
            border-color: var(--color-text);
        }

        /* ==================== 畫作彈出視窗 ==================== */
        .artwork-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .artwork-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            padding: 1rem;
        }

        .modal-content {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 0;
            position: relative;
            animation: scaleIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: -0.5rem;
            right: 0.5rem;
            width: 40px;
            height: 40px;
            background: var(--color-text);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            line-height: 1;
            transition: all 0.3s ease;
            z-index: 10;
            padding: 0;
        }

        .modal-close:hover {
            background: var(--color-accent);
        }

        .modal-image {
            width: calc(100% - 3rem);
            margin: 3.5rem 1.5rem 0 1.5rem;
            display: block;
            border: 1px solid var(--color-line);
        }

        .modal-info {
            margin-top: 0;
            text-align: center;
            padding: 1rem 1.5rem 2rem 1.5rem;
        }

        .modal-author {
            font-size: 1.125rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--color-text);
        }

        .modal-time {
            font-size: 0.875rem;
            opacity: 0.6;
            color: var(--color-text);
        }

        /* ==================== Loading 狀態 ==================== */
        .loading {
            text-align: center;
            padding: 2rem;
            opacity: 0.6;
        }

        /* ==================== 響應式設計 ==================== */
        
        /* 小手機 */
        @media (max-width: 375px) {
            :root {
                --spacing-unit: 1rem;
            }

            html {
                font-size: 15px;
            }
            
            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.8125rem;
            }
            
            .result-number {
                font-size: 3rem;
            }

            .tool-button,
            .color-button,
            .size-button {
                width: 40px;
                height: 40px;
            }

            .tool-button img {

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, push, set, get, onValue, query, orderByChild, limitToLast } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC_eW--r2QPE75BsbJuDkUHdD_QU3qmLV4",
            authDomain: "ladybug-gallery.firebaseapp.com",
            databaseURL: "https://ladybug-gallery-default-rtdb.firebaseio.com",
            projectId: "ladybug-gallery",
            storageBucket: "ladybug-gallery.firebasestorage.app",
            messagingSenderId: "713477060360",
            appId: "1:713477060360:web:8befa0cb1687cbdfec9ebd"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // ==================== 全域變數 ====================
        let userName = '';
        let userDrawing = null;
        let participantCount = 0;

        // ==================== 畫布相關變數 ====================
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let isDrawingShape = false;
        let currentTool = 'pen';
        let currentColor = '#212121';
        let currentSize = 2;
        let lastX = 0;
        let lastY = 0;
        let shapeStartX = 0;
        let shapeStartY = 0;
        let tempCanvas = null;

        // 回上一步功能
        let drawingHistory = [];
        let historyStep = -1;

        // 設定畫布背景為白色並儲存初始狀態
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveState();

        // ==================== Firebase 函數 ====================
        
        // 獲取參與人數
        async function getParticipantCount() {
            const countRef = ref(database, 'participantCount');
            const snapshot = await get(countRef);
            return snapshot.exists() ? snapshot.val() : 0;
        }

        // 增加參與人數
        async function incrementParticipantCount() {
            const countRef = ref(database, 'participantCount');
            const currentCount = await getParticipantCount();
            const newCount = currentCount + 1;
            await set(countRef, newCount);
            return newCount;
        }

        // 儲存繪圖到 Firebase
        async function saveDrawingToFirebase(drawingData) {
            const drawingsRef = ref(database, 'drawings');
            const newDrawingRef = push(drawingsRef);
            
            await set(newDrawingRef, {
                data: drawingData,
                userName: userName,
                timestamp: Date.now(),
                participantNumber: participantCount
            });
        }

        // 從 Firebase 載入所有繪圖
        function loadDrawingsFromFirebase(callback) {
            const drawingsRef = ref(database, 'drawings');
            const drawingsQuery = query(drawingsRef, orderByChild('timestamp'));
            
            onValue(drawingsQuery, (snapshot) => {
                const drawings = [];
                snapshot.forEach((childSnapshot) => {
                    drawings.push({
                        id: childSnapshot.key,
                        ...childSnapshot.val()
                    });
                });
                callback(drawings);
            });
        }

        // ==================== 儲存畫布狀態 ====================
        function saveState() {
            historyStep++;
            if (historyStep < drawingHistory.length) {
                drawingHistory.length = historyStep;
            }
            drawingHistory.push(canvas.toDataURL());
            
            if (drawingHistory.length > 20) {
                drawingHistory.shift();
                historyStep--;
            }
            
            updateUndoButton();
        }

        // ==================== 回上一步 ====================
        function undo() {
            if (historyStep > 0) {
                historyStep--;
                const img = new Image();
                img.src = drawingHistory[historyStep];
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                updateUndoButton();
            }
        }

        function updateUndoButton() {
            const undoButton = document.getElementById('undoButton');
            undoButton.disabled = historyStep <= 0;
        }

        // ==================== 階段切換函數 ====================
        function switchStage(fromStageId, toStageId) {
            const fromStage = document.getElementById(fromStageId);
            const toStage = document.getElementById(toStageId);
            
            fromStage.classList.remove('active');
            setTimeout(() => {
                toStage.classList.add('active');
            }, 300);
        }

        window.goToStage = function(stageId) {
            document.querySelectorAll('.stage').forEach(stage => {
                stage.classList.remove('active');
            });
            
            setTimeout(() => {
                document.getElementById(stageId).classList.add('active');
            }, 300);
        }

        window.goToDrawing = function() {
            const drawStage = document.getElementById('drawStage');
            drawStage.classList.add('slide-up');
        }

        window.goToHome = function() {
            location.reload();
        }

        // ==================== 階段 1: 名字表單處理 ====================
        document.getElementById('nameForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nameInput = document.getElementById('userName');
            const nameError = document.getElementById('nameError');
            
            userName = nameInput.value.trim();
            
            if (userName === '') {
                nameError.classList.add('show');
                nameInput.focus();
                return;
            }
            
            nameError.classList.remove('show');
            
            // 從 Firebase 獲取並增加參與人數
            participantCount = await incrementParticipantCount();
            document.getElementById('participantNumber').textContent = participantCount;
            
            switchStage('stage1', 'stage2');
            
            setTimeout(() => {
                animateNumber(participantCount);
            }, 300);
        });

        document.getElementById('userName').addEventListener('input', function() {
            document.getElementById('nameError').classList.remove('show');
        });

        // ==================== 數字動畫 ====================
        function animateNumber(targetNumber) {
            const element = document.getElementById('participantNumber');
            const duration = 1000;
            const steps = 30;
            const increment = targetNumber / steps;
            let current = 0;
            let step = 0;

            const timer = setInterval(() => {
                step++;
                current = Math.min(Math.floor(increment * step), targetNumber);
                element.textContent = current;

                if (step >= steps) {
                    clearInterval(timer);
                    element.textContent = targetNumber;
                }
            }, duration / steps);
        }

        // ==================== 繪圖功能 ====================
        
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            } else {
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }
        }

        function startDrawing(e) {
            e.preventDefault();
            const coords = getCoordinates(e);
            
            if (currentTool === 'fill') {
                floodFill(Math.floor(coords.x), Math.floor(coords.y), currentColor);
                saveState();
                return;
            }
            
            if (['line', 'rectangle', 'triangle', 'oval'].includes(currentTool)) {
                isDrawingShape = true;
                shapeStartX = coords.x;
                shapeStartY = coords.y;
                tempCanvas = ctx.getImageData(0, 0, canvas.width, canvas.height);
                return;
            }
            
            isDrawing = true;
            lastX = coords.x;
            lastY = coords.y;
        }

        function draw(e) {
            if (!isDrawing && !isDrawingShape) return;
            e.preventDefault();
            
            const coords = getCoordinates(e);
            
            if (isDrawingShape) {
                ctx.putImageData(tempCanvas, 0, 0);
                
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (currentTool === 'line') {
                    ctx.beginPath();
                    ctx.moveTo(shapeStartX, shapeStartY);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                } else if (currentTool === 'rectangle') {
                    const width = coords.x - shapeStartX;
                    const height = coords.y - shapeStartY;
                    ctx.strokeRect(shapeStartX, shapeStartY, width, height);
                } else if (currentTool === 'triangle') {
                    const width = coords.x - shapeStartX;
                    const height = coords.y - shapeStartY;
                    ctx.beginPath();
                    ctx.moveTo(shapeStartX + width / 2, shapeStartY);
                    ctx.lineTo(shapeStartX, shapeStartY + height);
                    ctx.lineTo(shapeStartX + width, shapeStartY + height);
                    ctx.closePath();
                    ctx.stroke();
                } else if (currentTool === 'oval') {
                    const width = coords.x - shapeStartX;
                    const height = coords.y - shapeStartY;
                    const centerX = shapeStartX + width / 2;
                    const centerY = shapeStartY + height / 2;
                    const radiusX = Math.abs(width / 2);
                    const radiusY = Math.abs(height / 2);
                    
                    ctx.beginPath();
                    ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, 2 * Math.PI);
                    ctx.stroke();
                }
                return;
            }
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalCompositeOperation = 'source-over';
            
            ctx.stroke();
            
            lastX = coords.x;
            lastY = coords.y;
        }

        function stopDrawing() {
            if (isDrawing || isDrawingShape) {
                saveState();
            }
            isDrawing = false;
            isDrawingShape = false;
        }

        // ==================== 填色功能 ====================
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const fillRGB = hexToRgb(fillColor);
            
            const startPos = (startY * canvas.width + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            
            if (startR === fillRGB.r && startG === fillRGB.g && startB === fillRGB.b) {
                return;
            }
            
            const stack = [[startX, startY]];
            const visited = new Set();
            
            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const key = `${x},${y}`;
                
                if (visited.has(key)) continue;
                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                
                const pos = (y * canvas.width + x) * 4;
                const r = data[pos];
                const g = data[pos + 1];
                const b = data[pos + 2];
                
                if (Math.abs(r - startR) <= 1 && Math.abs(g - startG) <= 1 && Math.abs(b - startB) <= 1) {
                    visited.add(key);
                    
                    data[pos] = fillRGB.r;
                    data[pos + 1] = fillRGB.g;
                    data[pos + 2] = fillRGB.b;
                    data[pos + 3] = 255;
                    
                    stack.push([x + 1, y]);
                    stack.push([x - 1, y]);
                    stack.push([x, y + 1]);
                    stack.push([x, y - 1]);
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // 事件監聽
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        // 工具選擇
        document.querySelectorAll('.tool-button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.tool-button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTool = this.dataset.tool;
            });
        });

        // 顏色選擇
        document.querySelectorAll('.color-button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.color-button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
            });
        });

        // 粗細選擇
        document.querySelectorAll('.size-button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.size-button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentSize = parseInt(this.dataset.size);
            });
        });

        // 回上一步
        document.getElementById('undoButton').addEventListener('click', undo);

        // 清除畫布
        document.getElementById('clearCanvas').addEventListener('click', function() {
            if (confirm('確定要清除畫布嗎？')) {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();
            }
        });

        // 完成繪圖
        document.getElementById('submitDrawing').addEventListener('click', async function() {
            userDrawing = canvas.toDataURL('image/png');
            
            // 儲存到 Firebase
            await saveDrawingToFirebase(userDrawing);
            
            showGallery();
        });

        // ==================== 顯示畫廊 ====================
        function showGallery() {
            const galleryStage = document.getElementById('galleryStage');
            
            // 載入畫廊內容
            loadDrawingsFromFirebase((drawings) => {
                const galleryGrid = document.getElementById('galleryGrid');
                galleryGrid.innerHTML = '';
                
                drawings.reverse().forEach((drawing, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    if (drawing.userName === userName && drawing.participantNumber === participantCount) {
                        item.classList.add('your-drawing');
                    }
                    
                    const img = document.createElement('img');
                    img.src = drawing.data;
                    item.appendChild(img);
                    
                    item.addEventListener('click', () => {
                        openModal(drawing);
                    });
                    
                    galleryGrid.appendChild(item);
                    
                    setTimeout(() => {
                        item.style.animationDelay = `${index * 0.05}s`;
                    }, 10);
                });
            });
            
            galleryStage.classList.add('slide-up');
        }

        // ==================== 彈出視窗功能 ====================
        window.openModal = function(drawing) {
            const modal = document.getElementById('artworkModal');
            const modalImage = document.getElementById('modalImage');
            const modalAuthor = document.getElementById('modalAuthor');
            const modalTime = document.getElementById('modalTime');
            
            modalImage.src = drawing.data;
            modalAuthor.textContent = `作者：${drawing.userName}`;
            
            const date = new Date(drawing.timestamp);
            const formattedTime = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            modalTime.textContent = formattedTime;
            
            modal.classList.add('active');
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }

        window.closeModal = function() {
            const modal = document.getElementById('artworkModal');
            modal.classList.remove('active');
        }

        // ==================== 防止頁面滾動影響繪圖 ====================
        document.getElementById('drawScrollArea').addEventListener('touchmove', function(e) {
            if (e.target === canvas) {
                e.preventDefault();
            }
        }, { passive: false });

        // ==================== 選單控制 ====================
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');

        function openMenu() {
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
        }

        function closeMenu() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        }

        // 三個漢堡按鈕都綁定同一個 openMenu
        ['hamburgerMenu', 'hamburgerMenuDraw', 'hamburgerMenuGallery'].forEach(id => {
            const btn = document.getElementById(id);
            if (btn) btn.addEventListener('click', openMenu);
        });

        menuClose.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMenu();
                closeModal();
            }
        });
    </script>
</body>
</html>
